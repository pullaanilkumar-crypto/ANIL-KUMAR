<!DOCTYPE html>
<html>
<head>
    <title>TONE Login</title>

    <style>
        body {
            font-family: Arial;
            background-color: #a1d60e;
        }

        .form {
            width: 300px;
            margin: 60px auto;
            padding: 20px;
            background-color: white;
            border: 1px solid black;
        }

        h2 {
            text-align: center;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 5px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            background-color: aqua;
        }

        .note {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="form">
        <h2>TONE Login</h2>

        <form action="toneonlinewebsite.html" method="GET">
            <label>Username</label>
            <input type="text" name="uname"required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Sign In</button>
        </form>

        <form action="tonesignup.html" method="GET">
            <button type="submit">Sign Up</button>
        </form>

        <p class="note">Welcome to  Music</p>
    </div>

</body>
</html>
